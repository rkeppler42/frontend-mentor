<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Preview Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <article class="card">
      <img
        class="card__img"
        src="imgs/illustration-article.svg"
        alt="An illustration representing programming code"
      />
      <p class="card__category">Learning</p>
      <p class="card__date">
        Published <time datetime="2023-12-21">21 Dec 2023</time>
      </p>
      <h1 class="card__title">HTML & CSS foundations</h1>
      <p class="card__description">
        These languages are the backbone of every website, defining structure,
        content, and presentation.
      </p>
      <div class="card__signature">
        <img
          src="imgs/image-avatar.webp"
          alt="A photo of Greg Hooper looking right"
          class="card__profile-picture"
        />
        <p class="card__author">Greg Hooper</p>
      </div>
    </article>
  </body>
</html>
